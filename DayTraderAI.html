*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#060d1b;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Inter',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a1020}::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.topbar{background:#070d1c;border-bottom:1px solid #1a2840;padding:0 14px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:8px}
.logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#00c987,#3b82f6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.logo-text{font-weight:800;font-size:14px;color:#f1f5f9;letter-spacing:-0.3px;line-height:1.1}
.logo-sub{font-size:9px;color:#334155;text-transform:uppercase;letter-spacing:0.06em}
.status-pill{display:flex;align-items:center;gap:5px;background:#0d1628;border:1px solid #1a2840;border-radius:20px;padding:4px 10px;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-green{background:#00c987;animation:pulse 2s infinite}
.dot-yellow{background:#f0a500;animation:pulse 2s infinite}
.dot-red{background:#ef4444;animation:pulse 2s infinite}
.status-text{font-size:11px;font-weight:600;white-space:nowrap}
.spinner{width:12px;height:12px;border:2px solid #1e293b;border-top:2px solid #00c987;border-radius:50%;animation:spin 0.7s linear infinite}
.refresh-btn{background:#0d1628;border:1px solid #1a2840;color:#64748b;border-radius:8px;padding:7px 13px;font-size:12px;cursor:pointer;font-weight:700;flex-shrink:0;-webkit-appearance:none}
.refresh-btn:active{background:#1e293b}

.ticker-wrap{background:#0a1020;border-bottom:1px solid #1a2840;overflow:hidden;height:26px;display:flex;align-items:center}
.ticker-track{display:flex;white-space:nowrap;animation:ticker 45s linear infinite}
.ticker-item{font-size:11px;color:#475569;padding:0 20px}
.ticker-item b{color:#94a3b8}
.live-badge{background:#ef444420;border:1px solid #ef444444;color:#ef4444;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin:0 10px;flex-shrink:0;white-space:nowrap}

.tabs{background:#070d1c;border-bottom:1px solid #1a2840;display:flex;overflow-x:auto;padding:0 14px}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:11px 15px;background:none;border:none;border-bottom:2.5px solid transparent;color:#475569;font-weight:600;font-size:12px;cursor:pointer;text-transform:uppercase;letter-spacing:0.05em;white-space:nowrap;flex-shrink:0;-webkit-appearance:none}
.tab.active{border-bottom-color:#00c987;color:#00c987}

.content{padding:12px;animation:fadeIn 0.25s ease}

.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.stat-card{background:#0d1628;border:1px solid #1a2840;border-radius:11px;padding:12px 8px;text-align:center}
.stat-val{font-size:20px;font-weight:900;margin-bottom:2px;letter-spacing:-0.5px}
.stat-label{font-size:9px;color:#475569;text-transform:uppercase;letter-spacing:0.04em}

.picks-banner{background:#040f08;border:1.5px solid #14532d;border-radius:12px;padding:13px;margin-bottom:12px}
.picks-title{font-size:10px;color:#22c55e;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:9px}
.picks-list{display:flex;gap:7px;flex-wrap:wrap}
.pick-btn{border-radius:8px;padding:6px 11px;cursor:pointer;display:flex;align-items:center;gap:7px;-webkit-appearance:none;border-width:1.5px;border-style:solid}
.pick-btn:active{opacity:0.8}
.pick-ticker{font-weight:900;font-size:13px}
.pick-range{font-size:10px;color:#94a3b8}
.pick-gain{font-size:10px;border-radius:4px;padding:2px 6px;font-weight:700;color:#060d1b}

.search-box{width:100%;background:#0d1628;border:1px solid #1a2840;border-radius:9px;padding:10px 13px;color:#f1f5f9;font-size:14px;outline:none;margin-bottom:11px;-webkit-appearance:none}
.search-box::placeholder{color:#334155}
.search-box:focus{border-color:#3b82f6}

.filter-bar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.filter-bar::-webkit-scrollbar{display:none}
.fbtn{background:#0d1628;border:1px solid #1a2840;color:#64748b;border-radius:7px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-appearance:none}
.fbtn.active{background:#1a3560;border-color:#3b82f6;color:#60a5fa}
.fbtn:active{opacity:0.8}

.stock-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:9px}
@media(max-width:620px){.stock-grid{grid-template-columns:1fr}}

.card{background:#0d1628;border:1.5px solid #1a2840;border-radius:13px;padding:13px;cursor:pointer;transition:border-color 0.12s}
.card:active{opacity:0.88}
.card.sel{border-color:#3b82f6;background:#0f2040}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px}
.card-ticker{font-size:17px;font-weight:900;color:#f1f5f9;letter-spacing:-0.5px}
.card-sector{font-size:10px;color:#475569;margin-top:2px}
.card-right{text-align:right;display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.badge{border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;white-space:nowrap;display:inline-block;border-width:1px;border-style:solid}
.price-line{display:flex;align-items:center;gap:5px;justify-content:flex-end}
.card-price{font-size:13px;font-weight:700;color:#f1f5f9}
.chg{font-size:10px;font-weight:600}
.up{color:#00c987}.dn{color:#ef4444}
.card-targets{display:flex;justify-content:space-between;margin:7px 0 5px;font-size:11px}
.cbar-wrap{display:flex;align-items:center;gap:7px}

.cbar-fill{height:100%;border-radius:3px}
.cbar-lbl{font-size:11px;font-weight:700;min-width:30px;text-align:right}

const f2 = n => (n!=null&&!isNaN(n)) ? Number(n).toFixed(2) : '—';
const SC = {'STRONG BUY':'#00c987','BUY':'#34d399','HOLD':'#f0a500','SHORT':'#fb7185','STRONG SHORT':'#ef4444'};
const RC = {'LOW':'#34d399','MEDIUM':'#f0a500','HIGH':'#ef4444'};
const sigC = s => SC[s]||'#94a3b8';
const riskC = r => RC[r]||'#94a3b8';
const confC = c => c>=75?'#00c987':c>=65?'#f0a500':'#ef4444';

function calcP(stk){
  const p = S.prices[stk.t]?.price;
  if(!p) return null;
  const buy=+(p*(1+stk.bO)).toFixed(2);
  const sell=+(p*(1+stk.sO)).toFixed(2);
  const stop=+(p*(1+stk.stO)).toFixed(2);
  return {
    buy, sell, stop,
    gain:+(sell-buy).toFixed(2),
    gainPct:((stk.sO-stk.bO)*100).toFixed(1),
    lossPct:(Math.abs(stk.stO-stk.bO)*100).toFixed(1)
  };
}

// FETCH — FINNHUB
// ═══════════════════════════════════════════════════
async function fetchOne(ticker){
  const url = `https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${FKEY}`;
  const ctrl = new AbortController();
  const tid = setTimeout(()=>ctrl.abort(), 12000);
  try{
    const r = await fetch(url, {
      signal: ctrl.signal,
      method: 'GET',
      mode: 'cors',
      cache: 'no-store',
      headers: { 'X-Finnhub-Token': FKEY }
    });
    clearTimeout(tid);
    if(!r.ok) return null;
    const d = await r.json();
    if(!d || typeof d.c !== 'number' || d.c === 0) return null;
    return d;
  } catch(e) { clearTimeout(tid); return null; }
}

async function fetchAll(){
  if(S.loading) return;
  S.loading = true;
  renderStatus();

  let liveCount = 0;
  // Fetch in batches of 5
  for(let i=0;i<STOCKS.length;i+=5){
    const batch = STOCKS.slice(i,i+5);
    const results = await Promise.all(batch.map(async stk=>{
      const d = await fetchOne(stk.t);
      return {t:stk.t, d};
    }));
    results.forEach(({t,d})=>{
      if(d&&d.c&&d.c>0){
        const chg = +(d.c-(d.pc||d.c)).toFixed(2);
        const chgPct = d.pc ? +((chg/d.pc)*100).toFixed(2) : 0;
        S.prices[t] = {price:d.c,change:chg,chgPct,open:d.o,high:d.h,low:d.l,prev:d.pc,live:true};
        S.hist[t] = [...(S.hist[t]||[]),d.c].slice(-60);
        liveCount++;
        S.apiOk = true;
      }
    });
    // Update count visually after each batch
    S.live = liveCount;
    renderStatus();
    if(i+5<STOCKS.length) await new Promise(r=>setTimeout(r,400));
  }

  S.live = liveCount;
  S.loading = false;
  S.lastUp = new Date();
  if(liveCount===0) S.apiOk = false;
  render();
}

  } else if(S.live>0){

    el.innerHTML = `<div class="dot dot-green"></div><span class="status-text" style="color:#00c987">Live ${S.live}/${STOCKS.length} · ${t}</span>`;

}

// SVG HELPERS
// ═══════════════════════════════════════════════════
function spark(pts,color,W=110,H=32){
  const d = pts&&pts.length>1?pts:[0,1];
  const mn=Math.min(...d),mx=Math.max(...d),r=mx-mn||0.01,p=2;
  const xs=d.map((_,i)=>p+i*(W-p*2)/(d.length-1));
  const ys=d.map(v=>H-p-((v-mn)/r)*(H-p*2));
  const line='M'+xs.map((x,i)=>`${x.toFixed(1)},${ys[i].toFixed(1)}`).join('L');
  const area=`M${xs[0].toFixed(1)},${H}L`+xs.map((x,i)=>`${x.toFixed(1)},${ys[i].toFixed(1)}`).join('L')+`L${xs[xs.length-1].toFixed(1)},${H}Z`;
  const id='s'+color.replace('#','');
  return `<svg width="${W}" height="${H}" style="display:block;width:100%"><defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.28"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#${id})"/><path d="${line}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

function bigChart(pts,color){
  const d=pts&&pts.length>1?pts:[98,99,100,101,102];
  const mn=Math.min(...d),mx=Math.max(...d),r=mx-mn||0.01;
  const W=400,H=70;
  const xs=d.map((_,i)=>i*(W/(d.length-1)));
  const ys=d.map(v=>H-((v-mn)/r)*H);
  const line='M'+xs.map((x,i)=>`${x.toFixed(1)},${ys[i].toFixed(1)}`).join('L');
  const area=`M0,${H}L`+xs.map((x,i)=>`${x.toFixed(1)},${ys[i].toFixed(1)}`).join('L')+`L${W},${H}Z`;
  return `<svg style="width:100%;height:70px" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.35"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#cg)"/><path d="${line}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round"/></svg>`;
}

function cbar(v){
  const c=confC(v);
  return `<div class="cbar-wrap"><div class="cbar-bg"><div class="cbar-fill" style="width:${v}%;background:${c}"></div></div><span class="cbar-lbl" style="color:${c}">${v}%</span></div>`;
}

function badge(lbl,color){
  return `<span class="badge" style="background:${color}1a;color:${color};border-color:${color}44">${lbl}</span>`;
}

function getFiltered(){
  let list = [...STOCKS];
  if(S.search){
    const q=S.search.toLowerCase();
    list=list.filter(s=>s.t.toLowerCase().includes(q)||s.n.toLowerCase().includes(q)||s.s.toLowerCase().includes(q));
  }
  switch(S.filter){
    case 'STRONG': return list.filter(s=>s.sig==='STRONG BUY'||s.sig==='STRONG SHORT');
    case 'BUY':    return list.filter(s=>s.sig==='BUY'||s.sig==='STRONG BUY');
    case 'SHORT':  return list.filter(s=>s.sig==='SHORT'||s.sig==='STRONG SHORT');
    case 'HOLD':   return list.filter(s=>s.sig==='HOLD');
    case 'TOP10':  return list.filter(s=>s.sig!=='HOLD'&&!s.sig.includes('SHORT')).sort((a,b)=>b.conf-a.conf).slice(0,10);
    default: return list;
  }
}

        <div class="ival">Send the .html file via iMessage, WhatsApp, AirDrop, or Email. Open in Safari and add to home screen — no App Store needed!</div>
      </div>
    </div>`;
  }

  const tabBtns=[['picks','📊 Picks'],['research','🔬 Research'],['about','ℹ️ About']]
    .map(([t,l])=>`<button class="tab${S.tab===t?' active':''}" onclick="setTab('${t}')">${l}</button>`).join('');

  root.innerHTML=`
    <div class="topbar">
      <div class="logo">
        <div class="logo-icon">📈</div>
        <div><div class="logo-text">Day Trader AI</div><div class="logo-sub">${STOCKS.length} Stocks · Live</div></div>
      </div>
      <div id="statpill" class="status-pill"><div class="dot dot-yellow"></div><span class="status-text" style="color:#f0a500">Connecting…</span></div>
      <button class="refresh-btn" onclick="manualRefresh()">↺</button>
    </div>
    <div class="ticker-wrap"><span class="live-badge">LIVE</span><div class="ticker-track">${tickerItems}</div></div>
    <div class="tabs">${tabBtns}</div>
    <div class="content">${mainContent}</div>
  `;
  renderStatus();
}

// ═══════════════════════════════════════════════════
// EVENT HANDLERS (global)
// ═══════════════════════════════════════════════════
function pickStock(t){ S.sel=t; S.detail=true; render(); window.scrollTo(0,0); }
function goBack(){ S.detail=false; render(); }
function setFilter(f){ S.filter=f; render(); }
function setTab(t){ S.tab=t; S.detail=false; render(); }
function doSearch(v){ S.search=v; render(); }
function manualRefresh(){ fetchAll(); }

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
render();
fetchAll();
setInterval(()=>{ if(!S.loading) fetchAll(); }, 30000);
</script>
</body>
